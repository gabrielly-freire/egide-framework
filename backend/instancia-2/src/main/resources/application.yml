server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: egide-instancia-2

  datasource:
    url: jdbc:postgresql://localhost:5434/egide_universitaria
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# Segurança JWT. O secret deve ter >= 32 bytes (HS256). Em produção, defina via env.
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:egide-instancia2-dev-secret-please-change-0123456789abcdef}
    expiration-ms: ${SECURITY_JWT_EXPIRATION_MS:86400000}

# Credenciais do usuário admin inicial (seed idempotente do DataInitializer).
app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin}
