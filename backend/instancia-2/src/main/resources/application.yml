server:
  port: 8081
  servlet:
    context-path: /api

spring:
  application:
    name: egide-instancia-2

  datasource:
    url: jdbc:postgresql://localhost:5434/egide_universitaria
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
