server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: egide-instancia-1

  datasource:
    url: jdbc:postgresql://localhost:5434/egidedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# Conexão com o microserviço de IA (Égide.IA MS). baseUrl inclui o prefixo /api/v1.
ai:
  base-url: ${AI_BASE_URL:http://localhost:8000/api/v1}
  api-key: ${AI_API_KEY:chave_secreta_egide}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000

# Segurança JWT. O secret deve ter >= 32 bytes (HS256). Em produção, defina via env.
security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:egide-instancia1-dev-secret-please-change-0123456789abcdef}
    expiration-ms: ${SECURITY_JWT_EXPIRATION_MS:86400000}

# Admin inicial criado pelo DataInitializer se não houver usuários.
app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin}