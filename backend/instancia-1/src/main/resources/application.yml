server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: egide-instancia-1

  datasource:
    url: jdbc:postgresql://localhost:5434/egidedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    validate-on-migrate: false