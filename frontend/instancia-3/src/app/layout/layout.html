<div class="page-wrapper">
  <!-- Sidebar -->
  <nav class="sidebar" [class.collapsed]="!sidebarOpen()">
    <div class="sidebar-brand">
      <i class="bi bi-shield-check"></i>
      <span class="brand-text">Ouvidoria Pública</span>
    </div>

    <ul class="sidebar-nav">
      <li>
        <a routerLink="/dashboard" routerLinkActive="active">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/manifestacoes" routerLinkActive="active">
          <i class="bi bi-file-text"></i>
          <span>Manifestações</span>
        </a>
      </li>
      <li>
        <a routerLink="/relatorios" routerLinkActive="active">
          <i class="bi bi-bar-chart"></i>
          <span>Relatórios</span>
        </a>
      </li>
      @if (auth.isAdmin()) {
        <li>
          <a routerLink="/analistas" routerLinkActive="active">
            <i class="bi bi-people"></i>
            <span>Analistas</span>
          </a>
        </li>
      }
    </ul>

    <div class="sidebar-footer">
      <a routerLink="/portal" class="portal-link">
        <i class="bi bi-globe"></i>
        <span>Portal do Cidadão</span>
      </a>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <header class="top-bar">
      <button class="btn-toggle" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <span class="top-bar-title">Sistema de Atendimento Público</span>

      <div class="top-bar-user">
        <i class="bi bi-person-circle"></i>
        <span class="user-name">{{ auth.currentUser()?.name }}</span>
        <span class="badge rounded-pill role-badge">{{ auth.currentUser()?.role }}</span>
        <button class="btn-logout" (click)="logout()" title="Sair">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </header>

    <main class="content-area">
      <router-outlet />
    </main>
  </div>
</div>
